<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вейп Шоп | Интернет-витрина</title>
    <style>
        /* Общие стили и сброс */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            line-height: 1.6;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 0;
        }

        /* Дисклеймер (18+) */
        .disclaimer {
            background-color: #1a1a1a;
            border-bottom: 2px solid #39FF14;
            text-align: center;
            padding: 10px 20px;
            font-size: 13px;
            color: #aaaaaa;
        }

        /* Главный экран */
        .hero {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(180deg, rgba(18,18,18,0.8) 0%, rgba(26,26,26,1) 100%);
            border-bottom: 1px solid #2a2a2a;
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hero h1 span {
            color: #39FF14;
        }

        .hero p {
            font-size: 1.1rem;
            color: #cccccc;
            max-width: 600px;
            margin: 0 auto 30px auto;
        }

        .btn {
            display: inline-block;
            background-color: #39FF14;
            color: #000000;
            padding: 12px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 14px;
        }

        .btn:hover {
            background-color: #ffffff;
            box-shadow: 0 0 15px #39FF14;
        }

        /* Разделы */
        .section-title {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .section-title span {
            color: #39FF14;
        }

        /* Сетка категорий */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
        }

        .category-card {
            background-color: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 30px 20px;
            text-align: center;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .category-card:hover {
            transform: translateY(-5px);
            border-color: #39FF14;
        }

        .category-card h3 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #ffffff;
        }

        .category-card p {
            font-size: 0.9rem;
            color: #999999;
        }

        /* Преимущества */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        .feature-item {
            background-color: #1a1a1a;
